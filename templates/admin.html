<!DOCTYPE html>
<html>

<head>
<title>Guest List</title>
</head>

<body>

<h2>Guest List</h2>

<table border="1">

<tr>
<th>Name</th>
<th>Email</th>
<th>Guests</th>
<th>Attending</th>
</tr>

{% for r in rsvps %}

<tr>
<td>{{ r.name }}</td>
<td>{{ r.email }}</td>
<td>{{ r.guests }}</td>
<td>{{ r.attending }}</td>
</tr>

{% endfor %}

</table>

</body>
</html>
